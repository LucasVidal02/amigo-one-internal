<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amigo One – Release Notes</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --brand:       #008CFF;
    --brand-dark:  #0070CC;
    --brand-50:    #E6F4FF;
    --brand-100:   #CCE9FF;
    --bg:          #F8F9FA;
    --surface:     #FFFFFF;
    --sidebar-bg:  #0F172A;
    --sidebar-2:   #1E293B;
    --sidebar-3:   #334155;
    --border:      #E9ECEF;
    --text:        #0F172A;
    --text-2:      #334155;
    --text-3:      #64748B;
    --success:     #22C55E;
    --success-bg:  #DCFCE7;
    --warning:     #F59E0B;
    --warning-bg:  #FEF3C7;
    --fs-xs:       11px;
    --fs-sm:       12px;
    --fs-body:     14px;
    --fs-md:       15px;
    --fs-lg:       18px;
    --fs-xl:       24px;
    --fs-2xl:      32px;
    --fs-3xl:      44px;
    --radius:      12px;
    --radius-sm:   8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    background: var(--bg);
    color: var(--text);
    display: flex;
  }

  /* ══════════════════════════════════════
     SIDEBAR
  ══════════════════════════════════════ */
  .sidebar {
    width: 280px;
    flex-shrink: 0;
    background: var(--sidebar-bg);
    display: flex;
    flex-direction: column;
    height: 100vh;
    position: relative;
    z-index: 10;
  }

  .sidebar-header {
    padding: 28px 20px 20px;
    border-bottom: 1px solid rgba(255,255,255,.06);
  }
  .sidebar-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: var(--brand);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .logo-name {
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.3px;
  }
  .sidebar-subtitle {
    font-size: 11px;
    color: rgba(255,255,255,.35);
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding-left: 42px;
  }

  /* search */
  .sidebar-search {
    padding: 14px 16px;
    border-bottom: 1px solid rgba(255,255,255,.06);
  }
  .search-wrap {
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 10px; top: 50%;
    transform: translateY(-50%);
    color: rgba(255,255,255,.3);
  }
  .search-input {
    width: 100%;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 8px;
    padding: 7px 10px 7px 32px;
    font-size: 12px;
    color: #fff;
    outline: none;
    font-family: inherit;
    transition: border-color .2s;
  }
  .search-input::placeholder { color: rgba(255,255,255,.3); }
  .search-input:focus { border-color: var(--brand); }

  /* nav list */
  .sidebar-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0 16px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,.1) transparent;
  }
  .sidebar-list::-webkit-scrollbar { width: 4px; }
  .sidebar-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }

  .year-group { margin-bottom: 4px; }
  .year-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,.25);
    padding: 12px 20px 6px;
  }

  .release-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 20px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all .15s;
    position: relative;
  }
  .release-item:hover { background: rgba(255,255,255,.04); }
  .release-item.active {
    background: rgba(0,140,255,.12);
    border-left-color: var(--brand);
  }
  .release-item.active .ri-version { color: var(--brand); }

  .ri-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .ri-dot.released { background: var(--success); }
  .ri-dot.upcoming { background: var(--warning); border: 2px solid var(--warning); background: transparent; }

  .ri-info { flex: 1; min-width: 0; }
  .ri-version {
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,.85);
    letter-spacing: -0.2px;
  }
  .ri-date {
    font-size: 11px;
    color: rgba(255,255,255,.3);
    margin-top: 1px;
  }
  .ri-badge {
    font-size: 9px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    letter-spacing: .5px;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .badge-released { background: rgba(34,197,94,.15); color: #4ade80; }
  .badge-upcoming { background: rgba(245,158,11,.15); color: #fbbf24; }

  .sidebar-footer {
    padding: 14px 20px;
    border-top: 1px solid rgba(255,255,255,.06);
    font-size: 11px;
    color: rgba(255,255,255,.2);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .total-badge {
    background: rgba(0,140,255,.2);
    color: var(--brand);
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 10px;
  }

  /* ══════════════════════════════════════
     MAIN CONTENT
  ══════════════════════════════════════ */
  .main {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  /* top bar */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    z-index: 5;
  }
  .topbar-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .topbar-version {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .topbar-sep { color: var(--border); font-size: 16px; }
  .topbar-date { font-size: 13px; color: var(--text-3); }
  .status-pill {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: .3px;
  }
  .pill-released { background: var(--success-bg); color: #16a34a; }
  .pill-upcoming { background: var(--warning-bg); color: #d97706; }

  .topbar-nav {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .nav-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: rgba(15,23,42,.05);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-3);
    font-size: 14px;
    transition: all .15s;
  }
  .nav-btn:hover:not(:disabled) { background: var(--brand-50); color: var(--brand); }
  .nav-btn:disabled { opacity: .3; cursor: default; }

  /* content area */
  .content {
    padding: 40px 40px 60px;
    max-width: 960px;
  }

  /* hero */
  .release-hero {
    margin-bottom: 36px;
  }
  .hero-kicker {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--brand);
    margin-bottom: 10px;
    opacity: 0; transform: translateY(12px);
    transition: all .4s ease .05s;
  }
  .hero-title {
    font-size: var(--fs-3xl);
    font-weight: 800;
    color: var(--text);
    letter-spacing: -1.5px;
    line-height: 1.1;
    margin-bottom: 12px;
    opacity: 0; transform: translateY(12px);
    transition: all .4s ease .12s;
  }
  .hero-date-row {
    display: flex;
    align-items: center;
    gap: 10px;
    opacity: 0; transform: translateY(12px);
    transition: all .4s ease .18s;
  }
  .hero-date {
    font-size: 15px;
    color: var(--text-3);
  }

  /* description */
  .release-desc-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 28px;
    margin-bottom: 32px;
    opacity: 0; transform: translateY(12px);
    transition: all .4s ease .22s;
  }
  .block-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 12px;
  }
  .desc-text {
    font-size: 15px;
    color: var(--text-2);
    line-height: 1.7;
  }

  /* feature tags */
  .features-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 32px;
    opacity: 0; transform: translateY(12px);
    transition: all .4s ease .28s;
  }
  .ftag {
    font-size: 11px;
    font-weight: 700;
    padding: 4px 11px;
    border-radius: 6px;
    background: var(--brand-50);
    color: var(--brand-dark);
    border: 1px solid var(--brand-100);
    letter-spacing: .2px;
  }

  /* image section */
  .images-section {
    opacity: 0; transform: translateY(12px);
    transition: all .4s ease .34s;
  }
  .images-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  .images-grid.single { grid-template-columns: 1fr; max-width: 560px; }

  .img-frame {
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: 0 12px 40px -8px rgba(0,140,255,.15), 0 1px 3px rgba(15,23,42,.08);
    background: var(--surface);
  }
  .frame-bar {
    height: 32px;
    background: #F1F5F9;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 6px;
  }
  .frame-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    opacity: .6;
  }
  .fd-red    { background: #FF6B6B; }
  .fd-yellow { background: #F5C542; }
  .fd-green  { background: #40C057; }
  .frame-url {
    flex: 1;
    text-align: center;
    font-size: 10px;
    color: var(--text-3);
    font-family: monospace;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 3px 8px;
    margin: 0 8px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .frame-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-3);
    padding: 10px 16px 8px;
  }
  .frame-placeholder {
    height: 300px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text-3);
    background: linear-gradient(135deg, #f8f9fa 0%, #f1f5f9 100%);
  }
  .placeholder-icon {
    width: 48px; height: 48px;
    background: var(--brand-50);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .placeholder-text {
    font-size: 12px;
    color: var(--text-3);
    text-align: center;
    line-height: 1.5;
  }
  .placeholder-sub {
    font-size: 11px;
    color: rgba(100,116,139,.6);
    margin-top: 2px;
  }

  /* bullet features */
  .features-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 32px;
    opacity: 0; transform: translateY(12px);
    transition: all .4s ease .30s;
  }
  .feat-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
    transition: box-shadow .15s, border-color .15s;
  }
  .feat-item:hover { box-shadow: 0 4px 16px rgba(0,140,255,.08); border-color: var(--brand-100); }
  .feat-item.open { border-color: var(--brand); box-shadow: 0 4px 20px rgba(0,140,255,.14); }

  .feat-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    cursor: pointer;
    user-select: none;
    transition: background .1s;
  }
  .feat-header:hover { background: rgba(0,140,255,.02); }

  .feat-num {
    width: 22px; height: 22px;
    background: var(--brand-50);
    color: var(--brand-dark);
    border-radius: 6px;
    font-size: 11px;
    font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .feat-item.open .feat-num { background: var(--brand); color: #fff; }

  .feat-text { font-size: 14px; color: var(--text-2); line-height: 1.5; flex: 1; font-weight: 500; }
  .feat-item.open .feat-text { color: var(--text); }

  .feat-chevron {
    flex-shrink: 0;
    margin-top: 3px;
    color: var(--text-3);
    transition: transform .25s ease, color .15s;
  }
  .feat-item.open .feat-chevron { transform: rotate(180deg); color: var(--brand); }

  /* accordion body */
  .feat-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height .38s ease;
    border-top: 0px solid var(--border);
  }
  .feat-item.open .feat-body { max-height: 1200px; border-top-width: 1px; }
  .feat-body-inner {
    padding: 16px 20px 16px 50px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
  }
  .feat-section-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--brand);
    margin-bottom: 5px;
  }
  .feat-section-text {
    font-size: 13px;
    color: var(--text-2);
    line-height: 1.65;
  }
  .feat-section-empty {
    font-size: 12px;
    color: var(--text-3);
    font-style: italic;
  }
  .feat-jira-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 6px;
    font-size: 11px;
    color: var(--brand);
    text-decoration: none;
    font-weight: 600;
    opacity: .7;
    transition: opacity .15s;
  }
  .feat-jira-link:hover { opacity: 1; }

  /* images inside accordion */
  .feat-img-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    padding: 0 20px 18px 50px;
    border-top: 1px solid var(--border);
    padding-top: 16px;
  }
  .feat-img-frame {
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: 0 4px 16px -4px rgba(0,140,255,.12);
    background: var(--surface);
  }
  .feat-frame-bar {
    height: 26px;
    background: #F1F5F9;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 8px;
    gap: 4px;
  }
  .feat-frame-dot { width: 8px; height: 8px; border-radius: 50%; opacity: .6; }
  .feat-frame-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-3);
    padding: 7px 12px 5px;
  }
  .feat-frame-placeholder {
    height: 160px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: linear-gradient(135deg, #f8f9fa 0%, #f1f5f9 100%);
  }
  .feat-placeholder-icon { font-size: 20px; }
  .feat-placeholder-text {
    font-size: 11px;
    color: var(--text-3);
    text-align: center;
    line-height: 1.4;
  }

  /* empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 40px;
    color: var(--text-3);
    text-align: center;
    gap: 12px;
  }
  .empty-icon { font-size: 40px; }
  .empty-title { font-size: 18px; font-weight: 700; color: var(--text-2); }
  .empty-sub { font-size: 14px; }

  /* animations */
  .anim-in .hero-kicker,
  .anim-in .hero-title,
  .anim-in .hero-date-row,
  .anim-in .release-desc-block,
  .anim-in .features-row,
  .anim-in .features-list,
  .anim-in .images-section,
  .anim-in .release-empty-plan {
    opacity: 1;
    transform: translateY(0);
  }

  /* scrollbar */
  .main::-webkit-scrollbar { width: 5px; }
  .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* no result */
  .no-result {
    padding: 20px;
    font-size: 12px;
    color: rgba(255,255,255,.25);
    text-align: center;
  }

  /* ── Upcoming section toggle ── */
  .upcoming-section { margin-bottom: 4px; }
  .upcoming-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    cursor: pointer;
    user-select: none;
    transition: background .15s;
  }
  .upcoming-toggle:hover { background: rgba(255,255,255,.04); }
  .upcoming-toggle-label {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,.35);
  }
  .upcoming-toggle-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    border: 2px solid #fbbf24;
    flex-shrink: 0;
  }
  .upcoming-toggle svg { transition: transform .2s; color: rgba(255,255,255,.25); }
  .upcoming-toggle.open svg { transform: rotate(180deg); }
  .upcoming-items { overflow: hidden; }
  .upcoming-items.collapsed { display: none; }
</style>
</head>
<body>

<!-- ── SIDEBAR ── -->
<aside class="sidebar">
  <div class="sidebar-header">
    <a href="index.html" style="display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:600; color:rgba(255,255,255,.35); text-decoration:none; letter-spacing:.3px; margin-bottom:14px; transition:color .15s;" onmouseover="this.style.color='rgba(255,255,255,.7)'" onmouseout="this.style.color='rgba(255,255,255,.35)'">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
      Portal Amigo One
    </a>
    <div class="sidebar-logo">

let currentIdx = null;

/* ── Build release item ── */
function createReleaseItem(r) {
  const item = document.createElement('div');
  item.className = 'release-item' + (currentIdx === r.id ? ' active' : '');
  item.dataset.id = r.id;
  item.innerHTML = `
    <div class="ri-dot ${r.released ? 'released' : 'upcoming'}"></div>
    <div class="ri-info">
      <div class="ri-version">${r.name}</div>
      <div class="ri-date">${fmt(r.releaseDate)}</div>
    </div>
    <span class="ri-badge ${r.released ? 'badge-released' : 'badge-upcoming'}">
      ${r.released ? 'Live' : 'Soon'}
    </span>`;
  item.addEventListener('click', () => selectRelease(r.id));
  return item;
}

/* ── Build sidebar ── */
function buildSidebar(list) {
  const nav = document.getElementById('sidebarList');
  nav.innerHTML = '';

  if (list.length === 0) {
    nav.innerHTML = '<div class="no-result">Nenhuma release encontrada</div>';
    document.getElementById('totalBadge').textContent = '0 releases';
    return;
  }

  const upcoming = list.filter(r => !r.released);
  const released = list.filter(r => r.released);

  /* ── Seção "Próximas" (colapsada por padrão) ── */
  if (upcoming.length > 0) {
    const section = document.createElement('div');
    section.className = 'upcoming-section';
    const toggle = document.createElement('div');
    toggle.className = 'upcoming-toggle';
    toggle.innerHTML = `
      <span class="upcoming-toggle-label">
        <span class="upcoming-toggle-dot"></span>
        Próximas (${upcoming.length})
      </span>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg>`;
    const items = document.createElement('div');
    items.className = 'upcoming-items collapsed';
    upcoming.forEach(r => items.appendChild(createReleaseItem(r)));
    toggle.addEventListener('click', () => {
      const isOpen = toggle.classList.contains('open');
      toggle.classList.toggle('open', !isOpen);
      items.classList.toggle('collapsed', isOpen);
    });
    section.appendChild(toggle);
    section.appendChild(items);
    nav.appendChild(section);
  }

  /* ── Seção "Lançadas" (por ano) ── */
  const years = [...new Set(released.map(r => r.year))].sort((a,b)=>b-a);
  years.forEach(y => {
    const group = released.filter(r => r.year === y);
    const div = document.createElement('div');
    div.className = 'year-group';
    div.innerHTML = `<div class="year-label">${y}</div>`;
    group.forEach(r => div.appendChild(createReleaseItem(r)));
    nav.appendChild(div);
  });

  document.getElementById('totalBadge').textContent = `${list.length} releases`;
}

/* ── Select release ── */
function selectRelease(id) {

  document.querySelectorAll('.release-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);

  const r = RELEASES.find(r => r.id === id);
  const allIds = RELEASES.map(r => r.id);

        </div>

        <div class="features-row">
          ${r.features.map(f => {

              </div>
              ${bodyHtml}
            </div>`;
          }).join('')}
        </div>
      ` : ''}

    </div>
  `;

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {

/* ── Accordion toggle (exclusive — fecha os outros ao abrir) ── */
function toggleFeat(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const isOpen = el.classList.contains('open');
  // fecha todos os outros abertos
  document.querySelectorAll('.feat-item.open').forEach(item => {
    if (item.id !== id) item.classList.remove('open');
  });
  el.classList.toggle('open', !isOpen);
}

/* ── Filter ── */
function filterReleases(q) {
  q = q.toLowerCase();
  filteredList = q
    ? RELEASES.filter(r => r.name.toLowerCase().includes(q) || r.desc.toLowerCase().includes(q))
    : [...RELEASES];
  buildSidebar(filteredList);
}

/* ── Init ── */
buildSidebar(RELEASES);

// auto-select most recent released version
const lastReleased = RELEASES.find(r => r.released === true) || RELEASES[0];
if (lastReleased) selectRelease(lastReleased.id);
</script>
