:root {

.sidebar-header { padding: 20px 20px 16px; border-bottom: 1px solid rgba(255,255,255,.06); }

.back-link:hover { color: rgba(255,255,255,.7); }
.sidebar-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 3px; }
.logo-icon { width: 32px; height: 32px; background: var(--brand); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.logo-name { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: -.3px; }
.sidebar-subtitle { font-size: 11px; color: rgba(255,255,255,.35); font-weight: 500; letter-spacing: 2px; text-transform: uppercase; padding-left: 42px; }
.sidebar-search { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,.06); }
.search-wrap { position: relative; }
.search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,.3); }
.search-input { width: 100%; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.08); border-radius: 8px; padding: 7px 10px 7px 32px; font-size: 12px; color: #fff; outline: none; font-family: inherit; transition: border-color .2s; }
.search-input::placeholder { color: rgba(255,255,255,.3); }
.search-input:focus { border-color: rgba(0,140,255,.5); }
.sidebar-tree { flex: 1; overflow-y: auto; padding: 10px 0 20px; }
.sidebar-tree::-webkit-scrollbar { width: 4px; }
.sidebar-tree::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 4px; }
.tree-group { margin-bottom: 4px; }
.tree-item { display: flex; align-items: center; gap: 6px; padding: 6px 16px 6px 12px; font-size: 12.5px; font-weight: 500; color: rgba(255,255,255,.55); cursor: pointer; transition: background .12s, color .12s; border-radius: 0; user-select: none; }
.tree-item:hover { background: rgba(255,255,255,.05); color: rgba(255,255,255,.85); }
.tree-item.active { background: rgba(0,140,255,.18); color: #60AAFF; font-weight: 600; }
.tree-item .ti-chevron { margin-left: auto; transition: transform .2s; flex-shrink: 0; opacity: .4; }
.tree-item.open .ti-chevron { transform: rotate(90deg); }
.tree-item .ti-indent { flex-shrink: 0; }
.tree-children { overflow: hidden; max-height: 0; transition: max-height .3s ease; }
.tree-children.open { max-height: 1000px; }

/* ── MAIN ── */
.main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
.topbar { height: 52px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 32px; gap: 12px; flex-shrink: 0; }
.breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-3); }
.breadcrumb span { color: var(--text-3); }
.breadcrumb .bc-current { color: var(--text-2); font-weight: 600; }
.topbar-actions { margin-left: auto; display: flex; gap: 8px; }
.outline-link { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; color: var(--brand); text-decoration: none; padding: 5px 12px; border: 1px solid rgba(0,140,255,.25); border-radius: 7px; transition: background .15s; }

.content-area { flex: 1; overflow-y: auto; padding: 40px 52px 60px; max-width: 860px; }
.content-area::-webkit-scrollbar { width: 6px; }
.content-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ── DOC CONTENT ── */
.doc-title { font-size: 28px; font-weight: 800; color: var(--text); letter-spacing: -.5px; margin-bottom: 6px; }
.doc-meta { font-size: 12px; color: var(--text-3); margin-bottom: 32px; display: flex; align-items: center; gap: 12px; }
.doc-meta span { display: flex; align-items: center; gap: 4px; }
.doc-body { font-size: 14.5px; line-height: 1.75; color: var(--text-2); }

.doc-body a { color: var(--brand); text-decoration: none; }

    content: `### Introdução & Objetivo

O **Amigo One** é um aplicativo inovador projetado para profissionais de saúde organizarem sua rotina e expandirem o acesso ao cuidado, onde quer que estejam. Ele simplifica processos complexos, proporcionando praticidade e eficiência no dia a dia.

---

### Público-Alvo

O Amigo One foi pensado para atender diferentes etapas da jornada profissional na área médica:

* **Estudantes de medicina** em universidades ou faculdades.
* **Estudantes em fase de conclusão do curso**, prontos para entrar no mercado de trabalho.
* **Médicos recém-formados**, iniciando sua atuação profissional.
* **Médicos experientes**, com graduação, residência ou especialização concluídas, buscando ferramentas que otimizem sua prática.

---

### Por que utilizar o Amigo One?

A rotina do profissional de saúde é frequentemente marcada por processos burocráticos que dificultam a gestão do tempo e a prestação de serviços. O **Amigo One** organiza e centraliza esses processos em um único aplicativo, tornando-os mais simples, acessíveis e eficientes. O objetivo é reduzir a carga administrativa e permitir que o profissional foque no que realmente importa: o cuidado com as pessoas.

---

### Serviços Integrados

#### Amigo Contábil

Um serviço integrado ao Amigo One que simplifica a gestão contábil do profissional de saúde:

* **Abertura de empresa gratuita**.
* **Emissão ilimitada de notas fiscais**.
* **Pagamentos simplificados das obrigações fiscais**: toda a contabilidade do cliente é gerenciada pela equipe especializada do Amigo Contábil.

#### Amigo Pay

O **Amigo Pay** é parte essencial da plataforma **Amigo One**, oferecendo uma solução de gestão financeira adaptada às necessidades dos profissionais de saúde:

* **Gerenciamento de Recebíveis**: Acompanhe todos os recebimentos de forma clara e organizada.
* **Transferências via PIX e TED**: Realize transferências instantâneas e seguras.
* **Emissão de Boletos**: Gera boletos de forma prática e eficiente.
* **Geração de Extratos Completos**: Acesso a extratos financeiros detalhados.`

    breadcrumb: ['Amigo One', 'Documentação'],
    content: `O fluxo de criação de conta no **Amigo One** é composto por cinco etapas principais:

---

### 1. Cadastro dos Dados de Acesso

Nesta etapa, o usuário deve fornecer:

* **E-mail de acesso**: Caso o e-mail informado já esteja cadastrado na base, o sistema exibirá uma mensagem informando que o e-mail está em uso.
* **Senha de acesso**.

---

### 2. Validação por E-mail

Após preencher as informações, será necessário verificar o e-mail informado. O usuário receberá um **código de verificação de 4 dígitos**. Caso não receba o código, o Amigo One disponibiliza a opção de reenviar por meio do botão **"Reenviar código"**.

---

### 3. Cadastro e Validação do Celular

O usuário deve informar um número de celular válido. Um **código de 4 dígitos** será enviado via SMS para o celular informado.

---

### 4. Cadastro de Dados Pessoais

* **Nome completo**
* **CPF**: Após a criação da conta, o CPF não poderá ser alterado.
* **Data de nascimento**

Se o usuário for um profissional da área da saúde, serão necessárias também as informações do conselho profissional:

* **Nome do conselho**
* **Número do conselho**
* **Estado do conselho**

> *Caso o usuário seja estudante, não será necessário preencher os dados relacionados ao conselho.*

---

### 5. Validação Facial

A validação facial é realizada por meio do sistema de segurança da **UnicoID**. Caso ocorram problemas durante esse processo, o usuário deverá entrar em contato com o suporte para entender o motivo e solicitar a liberação do dispositivo.`

    content: `A *home* do Amigo One é dividida por seções, ordenadas da seguinte forma:

## Seção "Meus Atalhos"

A seção "Meus atalhos" permite que os usuários personalizem seus atalhos para acessar recursos de forma rápida e eficiente.

### Atalhos Padrão

Ao abrir o Amigo One pela primeira vez, os seguintes atalhos estarão disponíveis em ordem: **Pacientes, Evento, AmigoSign, Emitir NFS-e e Suporte**.

### Como Personalizar?

#### Adicionar Atalhos

1. Clique no botão **"Adicionar"** para abrir a tela de seleção de atalhos.
2. Escolha os atalhos desejados em diferentes categorias:
   * **Geral**: Pacientes, Evento, AmigoSign e Suporte.
   * **Evento**: Consulta, Teleconsulta, Cirurgia, Plantão e Bloqueio de agenda.
   * **Contabilidade**: Notas emitidas, Impostos e taxas e Emitir NFS-e.
   * **Pagamentos**: Pix, Pagar, Receber, Transferir e Extrato.
3. Os atalhos selecionados serão destacados em azul.

#### Regras de Funcionamento

* Os atalhos do Amigo Pay apenas aparecem caso o usuário tenha a conta Amigo Pay ativa.
* Se um serviço associado a um atalho for desativado/cancelado, o atalho será mantido, mas redirecionará para a tela de assinatura correspondente.

---

## Seção "Chat Amigo Intelligence"

O **Chat Amigo Intelligence** foi desenvolvido exclusivamente para **profissionais e estudantes da área da saúde**, com o objetivo de oferecer suporte prático no dia a dia.

### Funcionalidades

* **Envio de Arquivos**: Até 5 arquivos nos formatos PDF, JPEG ou PNG.
* **Envio de Áudio e Transcrição**: Transcrição automática de até 60 segundos.
* **Prompts Pré-Definidos**: Prompts que ajudam a direcionar a interação com a IA.

### Regras de Assinatura

* **Assinatura Free**: Até **5 mensagens por dia**, independentemente do número de conversas.
* **Assinatura Premium IA**: **Mensagens ilimitadas**.

---

## Seção "Próximo Evento da Agenda"

Exibe o próximo evento agendado com dia, mês, ano, nome do paciente e valor do atendimento com status (Recebido ou Pendente).

### Regras

* Apenas eventos do dia atual em diante são exibidos.
* Eventos com status "Faltou", "Cancelado" e "Finalizado" não são considerados.
* O evento muda automaticamente conforme o horário avança.

---

## Seção "Publicações"

Exibe as últimas postagens em um formato de carrossel com as **5 últimas publicações** feitas na Rede Amigo. A sexta opção redireciona para o feed completo.

---

## Seção "Assistente de Pagamentos"

        { id: 'ia-prontuario', label: 'IA no Prontuário' }
      ]}
    ]},

    { id: 'financas', label: 'Finanças', children: [
      { id: 'honorarios', label: 'Honorários' },
      { id: 'contabilidade', label: 'Contabilidade' },
      { id: 'amigo-pay', label: 'Amigo Pay' }
    ]},
    { id: 'anestesiologistas', label: 'Para Anestesiologistas' }
  ]}
];

let currentId = null;
const openGroups = new Set(['amigo-one', 'pacientes', 'prontuario', 'financas']);

// ── MARKDOWN RENDERER ─────────────────────────────────────────
function fmt(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank" class="doc-link">$1</a>');
}

function mdToHtml(text) {
  if (!text) return '';
  const lines = text.split('\n');
  let html = '';
  let listType = null;

  const closeList = () => {
    if (listType) { html += `</${listType}>`; listType = null; }
  };

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const trimmed = line.trim();

    if (/^---+$/.test(trimmed)) { closeList(); html += '<hr>'; continue; }
    if (trimmed.startsWith('#### ')) { closeList(); html += `<h4>${fmt(trimmed.slice(5))}</h4>`; continue; }
    if (trimmed.startsWith('### ')) { closeList(); html += `<h3>${fmt(trimmed.slice(4))}</h3>`; continue; }
    if (trimmed.startsWith('## ')) { closeList(); html += `<h2>${fmt(trimmed.slice(3))}</h2>`; continue; }
    if (trimmed.startsWith('> ')) { closeList(); html += `<blockquote>${fmt(trimmed.slice(2))}</blockquote>`; continue; }

    // Numbered list
    if (/^\d+\.\s/.test(trimmed)) {
      if (listType !== 'ol') { closeList(); html += '<ol>'; listType = 'ol'; }
      html += `<li>${fmt(trimmed.replace(/^\d+\.\s/, ''))}</li>`; continue;
    }

    // Bullet list (handle indented)
    if (/^\s*\*\s/.test(line) && !trimmed.startsWith('**')) {
      const content = trimmed.slice(2);
      const isIndented = line.startsWith('  ');
      if (isIndented && listType === 'ul') {
        html += `<li style="margin-left:16px">${fmt(content)}</li>`;
      } else {
        if (listType !== 'ul') { closeList(); html += '<ul>'; listType = 'ul'; }
        html += `<li>${fmt(content)}</li>`;
      }
      continue;
    }

    if (trimmed === '' || trimmed === '\\') { closeList(); continue; }

    closeList();
    html += `<p>${fmt(trimmed)}</p>`;
  }

  closeList();
  return html;
}

// ── RENDER NAV ────────────────────────────────────────────────
function renderNav(nodes, depth = 0) {
  let html = '';
  for (const node of nodes) {
    const hasChildren = node.children && node.children.length > 0;
    const isOpen = openGroups.has(node.id);
    const isActive = node.id === currentId;
    const indent = depth * 14;

    html += `<div class="tree-group" id="tg-${node.id}">
      <div class="tree-item${isActive ? ' active' : ''}${hasChildren && isOpen ? ' open' : ''}"
           onclick="handleTreeClick('${node.id}', ${hasChildren})"
           style="padding-left:${12 + indent}px">
        ${depth === 0 && node.icon ? `<span style="font-size:13px">${node.icon}</span>` : ''}
        <span>${node.label}</span>
        ${hasChildren ? `<svg class="ti-chevron" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>` : ''}
      </div>`;

    if (hasChildren) {
      html += `<div class="tree-children${isOpen ? ' open' : ''}" id="tc-${node.id}">`;
      html += renderNav(node.children, depth + 1);
      html += `</div>`;
    }
    html += `</div>`;
  }
  return html;
}

function handleTreeClick(id, hasChildren) {
  if (hasChildren) {
    if (openGroups.has(id)) openGroups.delete(id);
    else openGroups.add(id);
    // toggle children
    const tc = document.getElementById(`tc-${id}`);
    const ti = document.querySelector(`#tg-${id} > .tree-item`);
    if (tc) tc.classList.toggle('open', openGroups.has(id));
    if (ti) ti.classList.toggle('open', openGroups.has(id));
  }
  if (DOCS[id]) selectDoc(id);
}

// ── SELECT DOC ────────────────────────────────────────────────
function selectDoc(id) {
  currentId = id;
  const doc = DOCS[id];
  if (!doc) return;

  // Update active state
  document.querySelectorAll('.tree-item').forEach(el => el.classList.remove('active'));
  const activeItem = document.querySelector(`#tg-${id} > .tree-item`);
  if (activeItem) activeItem.classList.add('active');

  // Breadcrumb
  const bc = document.getElementById('breadcrumb');
  const parts = [...doc.breadcrumb, doc.title];
  bc.innerHTML = parts.map((p, i) => i < parts.length - 1
    ? `<span>${p}</span><span>›</span>`
    : `<span class="bc-current">${p}</span>`
  ).join('');

  // Outline link
  document.getElementById('outlineLink').href = doc.url;

  // Content
  const area = document.getElementById('contentArea');
  const updatedDate = new Date().toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });

  let body;
  if (!doc.content) {
    body = `<div class="doc-wip">
      <div class="doc-wip-icon">🚧</div>
      <div class="doc-wip-title">Página em construção</div>
      <div class="doc-wip-sub">Este conteúdo ainda está sendo elaborado. <a href="${doc.url}" target="_blank" style="color:var(--brand)">Ver no Outline →</a></div>
    </div>`;
  } else {
    body = `<div class="doc-body">${mdToHtml(doc.content)}</div>`;
  }

  area.innerHTML = `
    <h1 class="doc-title">${doc.title}</h1>
    <div class="doc-meta">
      <span>📄 Documentação do produto</span>
      <span>·</span>
      <span>Sincronizado do Outline</span>
    </div>
    ${body}
  `;
  area.scrollTop = 0;
}

// ── SEARCH ────────────────────────────────────────────────────
function filterDocs(q) {
  q = q.toLowerCase().trim();
  const allItems = document.querySelectorAll('.tree-item');
  const allGroups = document.querySelectorAll('.tree-group');

  if (!q) {
    allItems.forEach(el => el.style.display = '');
    allGroups.forEach(el => el.style.display = '');
    NAV[0].children.forEach(n => {
      const tc = document.getElementById(`tc-${n.id}`);
      if (tc) tc.classList.toggle('open', openGroups.has(n.id));
    });
    return;
  }

  // Show all parents when searching
  allItems.forEach(el => el.style.display = '');
  document.querySelectorAll('.tree-children').forEach(el => el.classList.add('open'));

  // Filter by label
  for (const [id, doc] of Object.entries(DOCS)) {
    const el = document.querySelector(`#tg-${id} > .tree-item`);
    if (!el) continue;
    const matches = doc.title.toLowerCase().includes(q) ||
                    (doc.content && doc.content.toLowerCase().includes(q));
    el.closest('.tree-group').style.display = matches ? '' : 'none';
  }
}
